<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colony Clash</title>
    <style>
        /* Guarantees absolute Fullscreen with no scrollbars */
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background-color: #2c3e50; font-family: Arial, sans-serif; }
        canvas { display: block; width: 100%; height: 100%; }
        
        #ui { position: absolute; top: 10px; left: 10px; pointer-events: none; background: rgba(0, 0, 0, 0.5); padding: 15px; border-radius: 8px; color: white; z-index: 10; }
        #ui h1 { margin: 0 0 10px 0; font-size: 24px; }
        #ui p { margin: 5px 0; font-size: 14px; }

        #lobby-banner { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); padding: 10px 30px; border-radius: 10px; border: 2px solid #f1c40f; text-align: center; pointer-events: none; z-index: 50; }
        
        /* Command Wheel styles */
        #command-wheel {
            position: absolute; width: 200px; height: 200px; margin-left: -100px; margin-top: -100px;
            border-radius: 50%; background: rgba(0, 0, 0, 0.6); pointer-events: auto; z-index: 100;
        }
        .wheel-btn {
            position: absolute; top: 50%; left: 50%; width: 60px; height: 30px; margin-top: -15px; margin-left: -30px;
            background: #e74c3c; color: white; text-align: center; line-height: 30px; border-radius: 15px;
            cursor: pointer; font-size: 12px; font-weight: bold; user-select: none; transition: background 0.2s, transform 0.2s;
        }
        .wheel-btn:hover { background: #f1c40f; color: black; }
        #guard-menu {
            position: absolute; width: 220px; height: 160px; margin-left: -110px; margin-top: -80px;
            border-radius: 18px; background: rgba(0, 0, 0, 0.72); pointer-events: auto; z-index: 110;
            padding: 14px 12px; box-sizing: border-box; border: 1px solid rgba(255,255,255,0.08);
        }
        .guard-btn {
            width: 100%; height: 34px; margin: 8px 0; border: none; border-radius: 10px;
            background: #e74c3c; color: white; cursor: pointer; font-size: 13px; font-weight: bold;
            transition: background 0.2s, transform 0.2s;
        }
        .guard-btn:hover { background: #f1c40f; color: black; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>Colony Clash</h1>
        <p>WASD to move | Mouse/Space to attack</p>
        <p>Hold <b>'C'</b> to open Command Wheel</p>
        <p id="status">Command: Waiting...</p>
    </div>

    <!-- Centered Lobby Banner -->
    <div id="lobby-banner">
        <h2 id="game-info" style="margin: 0; color: #f1c40f; font-size: 24px;">Waiting for opponents... (1/2)</h2>
        <p style="margin: 5px 0 0 0; font-size: 14px; color: white;">Farm beetles to build your army before the match begins!</p>
    </div>

    <!-- Win/Loss Screen -->
    <div id="game-over-screen" style="display: none; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.85); flex-direction: column; align-items: center; justify-content: center; z-index: 1000;">
        <h1 id="game-over-title" style="font-size: 80px; margin: 0; text-transform: uppercase; text-shadow: 4px 4px 0px #000;">GAME OVER</h1>
        <p id="game-over-desc" style="font-size: 28px; color: white;">You Lose.</p>
        <button onclick="location.reload()" style="padding: 15px 30px; font-size: 20px; font-weight: bold; margin-top: 30px; cursor: pointer; background: white; color: black; border: none; border-radius: 8px;">Play Again</button>
    </div>

    <!-- Command Wheel -->
    <div id="command-wheel" style="display: none;">
        <div class="wheel-btn" data-cmd="attack" style="transform: rotate(-90deg) translate(80px) rotate(90deg);">Attack</div>
        <div class="wheel-btn" data-cmd="guard_menu" style="transform: rotate(-18deg) translate(80px) rotate(18deg);">Guard</div>
        <div class="wheel-btn" data-cmd="forage" style="transform: rotate(54deg) translate(80px) rotate(-54deg);">Forage</div>
        <div class="wheel-btn" data-cmd="home" style="transform: rotate(126deg) translate(80px) rotate(-126deg);">Home</div>
        <div class="wheel-btn" data-cmd="follow" style="transform: rotate(198deg) translate(80px) rotate(-198deg);">Follow</div>
    </div>

    <div id="guard-menu" style="display: none;">
        <button class="guard-btn" data-cmd="guard_area">Guard Area</button>
        <button class="guard-btn" data-cmd="guard_home">Guard Home</button>
        <button class="guard-btn" data-cmd="back">Back</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>
</body>
</html>
